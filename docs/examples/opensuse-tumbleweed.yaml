apiVersion: initkit.io/v1alpha1
kind: WorkstationProfile

metadata:
  name: tumbleweed-dev
  labels:
    distro: opensuse-tumbleweed

spec:
  target:
    os:
      family: linux
      distribution: opensuse-tumbleweed
      architecture: amd64

  policy:
    dryRun: false
    continueOnError: false
    requireSudo: true
    reboot:
      allowed: false
      prompt: true

  vars:
    home: "${HOME}"
    user: "${USER}"
    binDir: "${HOME}/.local/bin"
    stateFile: "${HOME}/.local/state/initkit/tumbleweed-dev.state.json"

  sources:
    zypper:
      keyImports:
        - name: packman
          url: https://ftp.gwdg.de/pub/linux/misc/packman/suse/openSUSE_Tumbleweed/repodata/repomd.xml.key
      repositories:
        - name: packman
          url: https://ftp.gwdg.de/pub/linux/misc/packman/suse/openSUSE_Tumbleweed/
          autoRefresh: true
      commands:
        - name: refresh packman metadata
          run: "zypper --non-interactive refresh packman"
          sudo: true
    flatpak:
      remotes:
        - name: flathub
          url: https://flathub.org/repo/flathub.flatpakrepo
          ifMissing: true

  plan:
    - name: tumbleweed-base-cli
      kind: zypper-packages
      description: Build tools and terminal basics.
      execution:
        mode: sequential
        locks: [system-package-manager]
      when:
        os:
          family: linux
          distribution:
            oneOf: [opensuse, opensuse-tumbleweed, opensuse-leap, sles]
      spec:
        refresh: true
        actions:
          - action: dup-from
            args: [packman, --allow-vendor-change]
        install:
          - patterns-devel-base-devel_basis
          - ca-certificates
          - curl
          - git
          - gpg2
          - jq
          - unzip
          - zsh

    - name: tumbleweed-containers
      kind: zypper-packages
      description: Container tooling for openSUSE.
      execution:
        mode: sequential
        locks: [system-package-manager]
      when:
        os:
          family: linux
          distribution:
            oneOf: [opensuse, opensuse-tumbleweed, opensuse-leap, sles]
      spec:
        install:
          - docker
          - docker-compose

    - name: sdkman-runtimes
      kind: sdkman-packages
      description: JVM tooling managed through SDKMAN.
      spec:
        install:
          - candidate: java
            version: 21.0.4-tem
          - gradle
          - maven

    - name: tumbleweed-flatpaks
      kind: flatpak-packages
      description: Desktop apps through Flathub.
      execution:
        mode: sequential
        locks: [desktop-package-manager]
      spec:
        remote: flathub
        system: true
        install:
          - org.mozilla.firefox
          - com.spotify.Client

    - name: local-bin
      kind: commands
      description: Make sure user-local bin exists.
      spec:
        items:
          - name: ensure-local-bin
            run: "mkdir -p ${binDir} ${HOME}/.cache/initkit && touch ${HOME}/.cache/initkit/opensuse-local-bin.created"
            sudo: false
            creates: "${HOME}/.cache/initkit/opensuse-local-bin.created"
            unless: "test -d ${binDir}"

    - name: tumbleweed-sddm-wayland
      kind: file-writes
      description: Example root-owned SDDM Wayland configuration.
      spec:
        items:
          - name: sddm-wayland
            path: /etc/sddm.conf.d/wayland.conf
            content: |
              [General]
              DisplayServer=wayland
            sudo: true
            owner: root
            group: root
            mode: "0644"
            when:
              os:
                family: linux
                distribution:
                  oneOf: [opensuse, opensuse-tumbleweed, opensuse-leap, sles]

apiVersion: initkit.io/v1alpha1
kind: WorkstationProfile

metadata:
  name: ubuntu-dev
  labels:
    distro: ubuntu

spec:
  target:
    os:
      family: linux
      distribution: ubuntu
      version: "24.04"
      codename: noble
      architecture: amd64

  policy:
    dryRun: false
    continueOnError: false
    requireSudo: true
    reboot:
      allowed: false
      prompt: true

  vars:
    home: "${HOME}"
    user: "${USER}"
    binDir: "${HOME}/.local/bin"
    stateFile: "${HOME}/.local/state/initkit/ubuntu-dev.state.json"

  sources:
    apt:
      repositories:
        - name: docker
          keyUrl: https://download.docker.com/linux/ubuntu/gpg
          source: "deb [arch=amd64] https://download.docker.com/linux/ubuntu noble stable"
      updateBeforeInstall: true
    flatpak:
      remotes:
        - name: flathub
          url: https://flathub.org/repo/flathub.flatpakrepo
          ifMissing: true

  plan:
    - name: ubuntu-base-cli
      kind: apt-packages
      description: Build tools and everyday terminal basics.
      execution:
        mode: sequential
        locks: [system-package-manager]
      when:
        os:
          family: linux
          distribution:
            oneOf: [ubuntu, debian]
      spec:
        update: true
        actions:
          - upgrade
        install:
          - build-essential
          - ca-certificates
          - curl
          - git
          - gnupg
          - jq
          - unzip
          - zsh

    - name: ubuntu-containers
      kind: apt-packages
      description: Docker packages from the configured apt source.
      execution:
        mode: sequential
        locks: [system-package-manager]
      when:
        os:
          family: linux
          distribution:
            oneOf: [ubuntu, debian]
      spec:
        install:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin

    - name: direct-binaries
      kind: binary-downloads
      description: Install a direct binary archive and expose a stable user symlink.
      execution:
        mode: parallel
        maxConcurrency: 2
      spec:
        items:
          - name: delta
            url: https://github.com/dandavison/delta/releases/download/0.18.2/delta-0.18.2-x86_64-unknown-linux-gnu.tar.gz
            destination: "${binDir}/delta-0.18.2"
            mode: "0755"
            archive:
              type: tar.gz
              path: delta-0.18.2-x86_64-unknown-linux-gnu/delta
            symlinks:
              - path: "${binDir}/delta"
                target: "${binDir}/delta-0.18.2"

    - name: flathub-apps
      kind: flatpak-packages
      description: A couple of desktop apps through Flathub.
      execution:
        mode: sequential
        locks: [desktop-package-manager]
      spec:
        remote: flathub
        system: true
        install:
          - org.mozilla.firefox
          - com.spotify.Client

    - name: local-bin
      kind: commands
      description: Make sure user-local bin exists.
      spec:
        items:
          - name: ensure-local-bin
            run: "mkdir -p ${binDir} ${HOME}/.cache/initkit && touch ${HOME}/.cache/initkit/ubuntu-local-bin.created"
            sudo: false
            creates: "${HOME}/.cache/initkit/ubuntu-local-bin.created"
            unless: "test -d ${binDir}"
          - name: add-user-to-docker
            run: "usermod -aG docker ${user}"
            sudo: true
            unless: "id -nG ${user} | grep -qw docker"
            allowedExitCodes: [0, 6]
            confirm: "Add ${user} to the docker group; log out and back in afterward."

    - name: ubuntu-user-config
      kind: file-writes
      description: Write a small user-scoped marker config.
      spec:
        items:
          - name: initkit-tools-note
            path: "${HOME}/.config/initkit/ubuntu-tools.conf"
            content: |
              profile=ubuntu-dev
              package_manager=apt
            sudo: false
            mode: "0644"
